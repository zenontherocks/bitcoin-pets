name: Auto Merge PR

on:
  push:
    branches:
      - 'claude/**'

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Check for SQL injection patterns
        run: |
          if grep -Pn '`(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE).*\$\{' src/worker.js; then
            echo "Possible string-interpolated SQL detected. Use parameterized queries."
            exit 1
          fi

      - name: Lint JavaScript
        run: |
          npx --yes eslint@8 src/worker.js --no-eslintrc --rule '{"no-undef": "warn"}' --parser-options=ecmaVersion:2022,sourceType:module

      - name: Create PR if needed
        id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base = context.payload.repository.default_branch;
            core.info(`Branch: ${branch}, Base: ${base}`);

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (pulls.length > 0) {
              core.info(`Found existing PR #${pulls[0].number}`);
              return String(pulls[0].number);
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: base,
              title: `Merge ${branch}`,
              body: 'Automatically created and merged by CI.',
            });
            core.info(`Created PR #${pr.number}`);
            return String(pr.number);

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = Number('${{ steps.pr.outputs.result }}');
            core.info(`Merging PR #${pr_number}`);
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash',
            });

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: bfa7ab5ab9d8079599d35435e885f010
          wranglerVersion: "4.71.0"
